<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Master!</title>
    <!-- Confetti Library for satisfying effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #4361ee;
            --success: #2ec4b6;
            --danger: #e71d36;
            --warning: #ff9f1c;
            --bg: #f8f9fa;
            --text: #2b2d42;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .score { color: var(--primary); }
        .streak { color: var(--warning); }

        .question {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 1.5rem;
            font-size: 2rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 0 #2a3d99;
            position: relative;
        }

        .option:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #2a3d99;
        }

        /* Keyboard focus style */
        .option.focused {
            outline: 5px solid var(--warning);
            outline-offset: 3px;
            transform: scale(1.05);
        }

        .option.correct {
            background-color: var(--success);
            box-shadow: 0 5px 0 #1b8a7f;
        }

        .option.wrong {
            background-color: var(--danger);
            box-shadow: 0 5px 0 #a31124;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        .option.wrong-permanent {
            background-color: #ff4d6d;
            box-shadow: 0 5px 0 #c91838;
            opacity: 0.8;
            cursor: not-allowed;
            transform: translateY(5px);
            pointer-events: none;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .feedback {
            height: 2rem;
            margin-top: 1.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .feedback.show {
            opacity: 1;
        }

        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--danger); }

        .controls-hint {
            margin-top: 2rem;
            color: #6c757d;
            font-size: 0.9rem;
            font-family: sans-serif;
        }

        .level-up {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: var(--warning);
            text-shadow: 0 0 10px white, 0 0 20px white;
            pointer-events: none;
            opacity: 0;
            z-index: 10;
            white-space: nowrap;
        }

        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        @media (max-width: 480px) {
            .question { font-size: 3rem; }
            .option { font-size: 1.5rem; padding: 1rem; }
            .header { font-size: 1.2rem; }
            .level-up { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="score">Score: <span id="score-val">0</span></div>
            <div class="streak">🔥 Streak: <span id="streak-val">0</span></div>
        </div>

        <div class="question" id="question">? x ? = ?</div>

        <div class="options" id="options">
            <button class="option" id="opt-0">A</button>
            <button class="option" id="opt-1">B</button>
            <button class="option" id="opt-2">C</button>
            <button class="option" id="opt-3">D</button>
        </div>

        <div class="feedback" id="feedback">Feedback</div>
        <div class="level-up" id="level-up">Level Up! 🌟</div>
    </div>

    <div class="controls-hint">
        Use 🖱️ Click or ⌨️ Arrow Keys + Enter
    </div>

    <script>
        // Game State
        let currentAnswer = 0;
        let score = 0;
        let streak = 0;
        let level = 1;
        let isWaitingForNext = false;
        let focusedOptionIndex = -1;

        // DOM Elements
        const questionEl = document.getElementById('question');
        const optionsContainer = document.getElementById('options');
        const optionEls = [
            document.getElementById('opt-0'),
            document.getElementById('opt-1'),
            document.getElementById('opt-2'),
            document.getElementById('opt-3')
        ];
        const scoreEl = document.getElementById('score-val');
        const streakEl = document.getElementById('streak-val');
        const feedbackEl = document.getElementById('feedback');
        const levelUpEl = document.getElementById('level-up');

        // Audio Context for simple sounds
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); // C6
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'wrong') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'levelup') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                oscillator.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1);
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2);
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.6);
            }
        }

        // Generate Question
        function generateQuestion() {
            isWaitingForNext = false;
            focusedOptionIndex = -1;
            updateFocus();

            // Reset styles
            optionEls.forEach(el => {
                el.className = 'option';
                el.disabled = false;
            });
            feedbackEl.className = 'feedback';

            // Determine max number based on level/score
            let maxNum = 5 + Math.floor(score / 10);
            if (maxNum > 12) maxNum = 12;

            const num1 = Math.floor(Math.random() * maxNum) + 1;
            const num2 = Math.floor(Math.random() * maxNum) + 1;
            currentAnswer = num1 * num2;

            questionEl.textContent = `${num1} × ${num2} = ?`;

            // Generate wrong options
            let answers = [currentAnswer];

            let attempts = 0;
            while (answers.length < 4) {
                attempts++;
                // Generate plausible distractors
                let distractor;
                const strategy = Math.random();
                if (strategy < 0.3 && attempts < 10) {
                    // Off by one error in num1
                    distractor = (num1 + (Math.random() > 0.5 ? 1 : -1)) * num2;
                } else if (strategy < 0.6 && attempts < 10) {
                    // Off by one error in num2
                    distractor = num1 * (num2 + (Math.random() > 0.5 ? 1 : -1));
                } else if (strategy < 0.8 && attempts < 10) {
                    // Addition instead of multiplication
                    distractor = num1 + num2;
                } else {
                    // Random number close by
                    const offset = Math.floor(Math.random() * 20) - 10;
                    distractor = currentAnswer + offset;

                    // Failsafe for very long loops
                    if (distractor === currentAnswer || distractor <= 0) {
                        distractor = currentAnswer + attempts;
                    }
                }

                // Ensure positive, not 0 if we don't want it, and unique
                if (distractor > 0 && !answers.includes(distractor)) {
                    answers.push(distractor);
                }
            }

            // Shuffle array
            answers.sort(() => Math.random() - 0.5);

            // Assign to buttons
            optionEls.forEach((el, index) => {
                el.textContent = answers[index];
                el.dataset.value = answers[index];
                el.onclick = () => handleAnswer(el, parseInt(answers[index]));
            });
        }

        // Handle Answer
        function handleAnswer(element, selectedAnswer) {
            if (isWaitingForNext || element.classList.contains('wrong') || element.classList.contains('wrong-permanent')) return;

            // Initialize audio on first user interaction if needed
            if (!audioCtx) audioCtx = new AudioContext();

            if (selectedAnswer === currentAnswer) {
                // Correct Answer
                isWaitingForNext = true;
                element.classList.add('correct');
                playSound('correct');

                score += 10 + streak;
                streak++;

                scoreEl.textContent = score;
                streakEl.textContent = streak;

                feedbackEl.textContent = "Awesome! 🎉";
                feedbackEl.className = 'feedback show success';

                // Confetti!
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#2ec4b6', '#ff9f1c', '#4361ee']
                });

                // Check for level up every 5 streaks
                if (streak > 0 && streak % 5 === 0) {
                    setTimeout(() => {
                        playSound('levelup');
                        levelUpEl.style.animation = 'popOut 2s ease-out forwards';
                        confetti({
                            particleCount: 200,
                            spread: 160,
                            origin: { y: 0.5 }
                        });
                        setTimeout(() => { levelUpEl.style.animation = ''; }, 2000);
                    }, 500);
                }

                // Next question after delay
                setTimeout(generateQuestion, 1500);

            } else {
                // Wrong Answer
                element.classList.add('wrong');
                playSound('wrong');

                streak = 0;
                streakEl.textContent = streak;

                feedbackEl.textContent = "Oops! Try again. ❌";
                feedbackEl.className = 'feedback show error';

                // Remove wrong class after animation so it doesn't shake repeatedly if clicked again
                setTimeout(() => {
                    element.classList.remove('wrong');
                    element.classList.add('wrong-permanent');
                }, 500);
            }
        }

        // Keyboard Navigation
        function updateFocus() {
            optionEls.forEach((el, index) => {
                if (index === focusedOptionIndex) {
                    el.classList.add('focused');
                } else {
                    el.classList.remove('focused');
                }
            });
        }

        document.addEventListener('keydown', (e) => {
            if (isWaitingForNext) return;

            // Grid layout:
            // 0 1
            // 2 3

            switch(e.key) {
                case 'ArrowRight':
                    e.preventDefault();
                    if (focusedOptionIndex === -1) focusedOptionIndex = 0;
                    else if (focusedOptionIndex === 0) focusedOptionIndex = 1;
                    else if (focusedOptionIndex === 2) focusedOptionIndex = 3;
                    updateFocus();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (focusedOptionIndex === -1) focusedOptionIndex = 0;
                    else if (focusedOptionIndex === 1) focusedOptionIndex = 0;
                    else if (focusedOptionIndex === 3) focusedOptionIndex = 2;
                    updateFocus();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (focusedOptionIndex === -1) focusedOptionIndex = 0;
                    else if (focusedOptionIndex === 0) focusedOptionIndex = 2;
                    else if (focusedOptionIndex === 1) focusedOptionIndex = 3;
                    updateFocus();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    if (focusedOptionIndex === -1) focusedOptionIndex = 0;
                    else if (focusedOptionIndex === 2) focusedOptionIndex = 0;
                    else if (focusedOptionIndex === 3) focusedOptionIndex = 1;
                    updateFocus();
                    break;
                case 'Enter':
                case ' ':
                    e.preventDefault();
                    if (focusedOptionIndex !== -1) {
                        const el = optionEls[focusedOptionIndex];
                        handleAnswer(el, parseInt(el.dataset.value));
                    }
                    break;
            }
        });

        // Initialize game
        generateQuestion();
    </script>
</body>
</html>
